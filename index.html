<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-bold-rounded/css/uicons-bold-rounded.css">
<link rel="stylesheet" href="https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css">
<style>
body[data-theme='light'] {
	background: #F5EBE1;
	color: #2B1F12;
}

body[data-theme='dark'] {
	background: #2B1F12;
	color: #F5EBE1;
}

#headerBar {
	background: #2B1F12;
	color: #F5EBE1;
}

#toolbarBar {
	background: #2B1F12;
}

body[data-theme='light'] #toolbarBar {
	color: #D4995E;
}

body[data-theme='dark'] #toolbarBar {
	color: #F5EBE1;
}

#notesHeading {
	border-right-color: #F5EBE1;
}

body[data-theme='light'] #notesHeading {
	color: #D4995E;
}

body[data-theme='dark'] #notesHeading {
	color: #F5EBE1;
}

body[data-theme='light'] #appShell,
body[data-theme='light'] #mainContent,
body[data-theme='light'] #notesPanel,
body[data-theme='light'] #saveModalBox,
body[data-theme='light'] #shareModalBox,
body[data-theme='light'] #deleteModalBox,
body[data-theme='light'] #notepad,
body[data-theme='light'] #shareLink {
	background: #F5EBE1;
	color: #2B1F12;
}

body[data-theme='dark'] #appShell,
body[data-theme='dark'] #mainContent,
body[data-theme='dark'] #notesPanel,
body[data-theme='dark'] #saveModalBox,
body[data-theme='dark'] #shareModalBox,
body[data-theme='dark'] #deleteModalBox,
body[data-theme='dark'] #notepad,
body[data-theme='dark'] #shareLink {
	background: #2B1F12;
	color: #F5EBE1;
}

body[data-theme='light'] #appShell,
body[data-theme='light'] #mainContent,
body[data-theme='light'] #notesPanel {
	border-color: #2B1F12;
}

body[data-theme='dark'] #appShell,
body[data-theme='dark'] #mainContent,
body[data-theme='dark'] #notesPanel {
	border-color: #F5EBE1;
}

body[data-theme='light'] #fontFamily,
body[data-theme='light'] #fontSize {
	background: #F5EBE1;
	color: #D4995E;
	border-color: #D4995E;
}

body[data-theme='dark'] #fontFamily,
body[data-theme='dark'] #fontSize {
	background: #2B1F12;
	color: #F5EBE1;
	border-color: #D4995E;
}

body[data-theme='light'] #fontFamily option,
body[data-theme='light'] #fontSize option {
	color: #000000;
}

body[data-theme='dark'] #fontFamily option,
body[data-theme='dark'] #fontSize option {
	color: #F5EBE1;
}

body[data-theme='light'] #shareBtn,
body[data-theme='light'] .fi-br-square-plus,
body[data-theme='light'] .fi-sr-disk,
body[data-theme='light'] #fontFamilyLabel,
body[data-theme='light'] #fontSizeLabel,
body[data-theme='light'] #wordCountWrap,
body[data-theme='light'] #themeToggleWrap {
	color: #D4995E;
}

body[data-theme='dark'] #shareBtn,
body[data-theme='dark'] .fi-br-square-plus,
body[data-theme='dark'] .fi-sr-disk,
body[data-theme='dark'] #fontFamilyLabel,
body[data-theme='dark'] #fontSizeLabel,
body[data-theme='dark'] #wordCountWrap,
body[data-theme='dark'] #themeToggleWrap {
	color: #F5EBE1;
}

#savePrompt,
#sharePrompt {
	color: #F5EBE1;
}

.note-item {
	transition: background-color 150ms ease, color 150ms ease;
}

body[data-theme='light'] .note-item {
	background: #D4995E;
	color: #F5EBE1;
}

body[data-theme='dark'] .note-item {
	background: #896643;
	color: #F5EBE1;
}

body[data-theme='light'] .note-item:hover {
	background: #896643;
}

body[data-theme='dark'] .note-item:hover {
	background: #D4995E;
}

.note-delete {
	color: #F5EBE1;
}

#deleteYes,
#deleteNo,
#saveTxt,
#savePdf,
#saveDocx,
#copyLink,
#closeShare {
	color: #F5EBE1;
	transition: background-color 150ms ease, color 150ms ease;
}

#saveTxt,
#savePdf,
#saveDocx,
#copyLink,
#closeShare {
	background: #D4995E;
}

#saveTxt:hover,
#savePdf:hover,
#saveDocx:hover {
	background: #896643;
}

body[data-theme='light'] #deleteYes:hover,
body[data-theme='light'] #deleteNo:hover {
	background: #896643;
}

body[data-theme='dark'] #copyLink:hover,
body[data-theme='dark'] #closeShare:hover,
body[data-theme='dark'] #saveTxt:hover,
body[data-theme='dark'] #savePdf:hover,
body[data-theme='dark'] #saveDocx:hover {
	background: #D4995E;
}

body[data-theme='light'] #copyLink:hover,
body[data-theme='light'] #closeShare:hover {
	background: #896643;
}

#themeToggleTrack {
	border-color: #896643;
	background: #D4995E;
}

body[data-theme='dark'] #themeToggleTrack {
	background: linear-gradient(90deg, #2B1F12 0%, #896643 100%);
}

#themeToggleThumb {
	background: #F5EBE1;
	color: #2B1F12;
}

body[data-theme='light'] #themeToggleThumb {
	transform: translateX(0);
}

body[data-theme='dark'] #themeToggleThumb {
	transform: translateX(2rem);
}
</style>

</head>
<body id="pageBody" class="bg-[#F5EBE1] min-h-screen overflow-x-hidden">


<div id="headerBar" class="bg-[#2B1F12] text-[#F5EBE1] text-center font-bold font-mono tracking-wider text-4xl py-2">
<h1>NOTEPAD</h1>
</div>

<div id="appShell" class="w-300 min-h-[calc(100vh-7rem)] mt-10 mb-10 border-4 rounded-md border-[#2B1F12] mx-auto overflow-visible flex flex-col">

<div id="toolbarBar" class="bg-[#2B1F12] w-full h-14 flex items-stretch text-[#D4995E]">
<div id="notesHeading" class="w-50 h-full border-r-2 border-[#F5EBE1] px-3 flex items-center justify-center font-bold  text-xl tracking-wide">
<span>Notes</span>
</div>

<div class="flex-1 h-full flex items-stretch justify-evenly text-sm whitespace-nowrap overflow-x-hidden">
<div class="h-full px-3 flex items-center justify-center"><i class="fi fi-br-square-plus text-xl cursor-pointer" title="New Note"></i></div>
<div class="w-0.5 h-full bg-[#F5EBE1]"></div>

<div class="h-full px-3 flex items-center justify-center"><i class="fi fi-sr-disk text-xl cursor-pointer" title="Save"></i></div>
<div class="w-0.5 h-full bg-[#F5EBE1]"></div>

<div class="h-full px-3 flex items-center justify-center gap-3">
<label id="fontFamilyLabel" for="fontFamily" class="font-bold text-xl">Font</label>
<select id="fontFamily" class="bg-transparent border border-[#D4995E] rounded px-2 py-1 text-[#D4995E] focus:outline-none cursor-pointer">
<option value="monospace" class="text-black">Monospace</option>
<option value="serif" class="text-black">Serif</option>
<option value="sans-serif" class="text-black">Sans</option>
</select>
</div>
<div class="w-0.5 h-full bg-[#F5EBE1]"></div>

<div class="h-full px-3 flex items-center justify-center gap-3">
<label id="fontSizeLabel" for="fontSize" class="font-bold text-xl">Size</label>
<select id="fontSize" class="bg-transparent border border-[#D4995E] rounded px-2 py-1 text-[#D4995E] focus:outline-none cursor-pointer">
<option value="8" class="text-black">8</option>
<option value="10" class="text-black">10</option>
<option value="12" class="text-black">12</option>
<option value="14" class="text-black" selected>14</option>
<option value="18" class="text-black">18</option>
<option value="24" class="text-black">24</option>
<option value="36" class="text-black">36</option>
</select>
</div>
<div class="w-0.5 h-full bg-[#F5EBE1]"></div>

<button type="button" class="h-full px-3 font-bold text-xl cursor-pointer" id="shareBtn">Share</button>
<div class="w-0.5 h-full bg-[#F5EBE1]"></div>

<div class="h-full px-3 flex items-center justify-center gap-2 font-bold text-xl" id="wordCountWrap">
<span>Words:</span>
<span id="wordCount">0</span>
</div>
<div class="w-0.5 h-full bg-[#F5EBE1]"></div>

<div class="h-full px-3 flex items-center justify-center" id="themeToggleWrap">
<label class="flex items-center gap-2 cursor-pointer select-none">
<input id="themeToggle" type="checkbox" value="" class="sr-only">
<span id="themeToggleTrack" class="relative inline-flex h-8 w-16 items-center rounded-full border-2 border-[#896643] bg-[#D4995E] transition-colors duration-300">
<span id="themeToggleThumb" class="inline-flex h-6 w-6 translate-x-1 items-center justify-center rounded-full bg-[#F5EBE1] text-[#2B1F12] shadow-sm transition-transform duration-300">☀</span>
</span>
</label>
</div>
</div>
</div>

<div id="mainContent" class="flex flex-1 min-h-0 bg-[#F5EBE1] border-t-2 border-[#2B1F12]">
<div id="notesPanel" class="w-50 border-r-2 border-[#2B1F12] p-3 text-[#2B1F12] font-medium overflow-y-auto">
<div id="notesList"></div>
</div>
<div class="flex-1 p-4">
<textarea id="notepad" placeholder="Start writing..." class="w-full bg-[#F5EBE1] text-[#2B1F12] border-none outline-none resize-none" style="min-height: 100px; overflow: hidden;"></textarea>
</div>
</div>

</div>

<div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50">
<div id="deleteModalBox" class="bg-[#F5EBE1] p-6 rounded-lg shadow-lg text-center text-[#2B1F12]">
<p id="deletePrompt" class="mb-4 text-lg font-semibold text-[#2B1F12]">Are you sure you want to delete this note?</p>
<div class="flex gap-4 justify-center">
<button id="deleteYes" class="bg-red-600 hover:bg-red-700 text-[#2B1F12] px-4 py-2 rounded cursor-pointer">Yes</button>
<button id="deleteNo" class="bg-[#D4995E] hover:bg-[#896643] text-[#2B1F12] px-4 py-2 rounded cursor-pointer">No</button>
</div>
</div>
</div>

<div id="saveModal" class="hidden fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50">
<div id="saveModalBox" class="bg-[#F5EBE1] p-6 rounded-lg shadow-lg relative">
<button id="closeSave" class="absolute top-2 right-3 text-xl font-bold text-[#2B1F12] hover:text-black cursor-pointer" aria-label="Close save options">&times;</button>
<p id="savePrompt" class="mb-4 text-lg font-semibold text-[#2B1F12]">How do you want to save your note?</p>
<div class="flex flex-col gap-2">
<button id="saveTxt" class="bg-[#D4995E] hover:bg-[#896643] text-[#2B1F12] px-4 py-2 rounded cursor-pointer font-semibold">Text Document</button>
<button id="savePdf" class="bg-[#D4995E] hover:bg-[#896643] text-[#2B1F12] px-4 py-2 rounded cursor-pointer font-semibold">PDF</button>
<button id="saveDocx" class="bg-[#D4995E] hover:bg-[#896643] text-[#2B1F12] px-4 py-2 rounded cursor-pointer font-semibold">Word Document</button>
</div>
</div>
</div>

<div id="shareModal" class="hidden fixed inset-0 bg-black bg-opacity-50 items-center justify-center z-50">
<div id="shareModalBox" class="bg-[#F5EBE1] p-6 rounded-lg shadow-lg w-[32rem] min-h-[10rem]">
<p id="sharePrompt" class="mb-4 text-lg font-semibold text-[#2B1F12]">Share this note</p>
<input type="text" id="shareLink" readonly class="w-full border px-3 py-2 rounded mb-4 text-[#2B1F12]" />
<div class="flex gap-4">
<button id="copyLink" class="bg-green-600 hover:bg-green-800 text-white px-4 py-2 rounded cursor-pointer">Copy Link</button>
<button id="closeShare" class="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded cursor-pointer">Close</button>
</div>
</div>
</div>

<template id="noteTemplate">
<div class="note-item p-2 mb-2 rounded cursor-pointer flex justify-between items-center bg-[#D4995E] text-[#F5EBE1] transition-colors duration-150 hover:bg-[#896643] hover:text-[#F5EBE1]">
<span class="note-title flex-1"></span>
<button type="button" class="note-delete text-red-600 font-bold text-lg px-2 hover:text-red-700 cursor-pointer">✕</button>
</div>
</template>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.min.js"></script>
<script src="index.js"></script>
</body>
</html>
